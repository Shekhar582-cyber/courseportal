<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users List</title>
    <link rel="stylesheet" href="user.css">
</head>
<body>
    <div class="container">
        <h2>Users List</h2>
       <table border="1">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Password</th>
        </tr>
    </thead>

    <tbody id="usersList">
        <!-- data will come here -->
    </tbody>
</table>
<script>
function loadUsers() {

    fetch("http://localhost:8081/users/all")
    .then(response => response.json())
    .then(data => {

        let tableBody = document.getElementById("usersList");

        // clear previous data
        tableBody.innerHTML = "";

        // loop through users
        data.forEach(user => {

            let row = `
                <tr>
                    <td>${user.id}</td>
                    <td>${user.name}</td>
                    <td>${user.email}</td>
                    <td>${user.password}</td>
                </tr>
            `;

            tableBody.innerHTML += row;
        });

    })
    .catch(error => {
        console.error("Error:", error);
    });
}

// call function when page loads
window.onload = loadUsers;
</script>

    </div>
</body>
</html>
